metadata:
  title: 雨巷里的来信
  source_chapter_count: 3
  language: zh-CN
  genre: mystery drama
  logline: A young archivist follows hidden letters through an abandoned theater
    to uncover why her father vanished.
adaptation_profile:
  format_type: short_drama
  adaptation_scale: faithful
  style_focus: psychological
  preserve_items:
    - 保留林夏、周砚和父亲失踪线索
  forbidden_changes:
    - 不要改变父亲失踪的核心设定
  author_notes: 心理活动尽量转成可表演动作和克制对白。
adaptation_strategy:
  - 建议先做忠实但更具戏剧推动力的短剧版：保留人物关系和线索链，把心理与氛围转成动作、对白和场景冲突。
  - Track source chapters and excerpts so the author can audit what changed.
  - Label AI additions separately from adapted source material.
characters:
  - id: char_linxia
    name: 林夏
    role: protagonist
    description: A careful young archivist who decides to continue her father's 
      unfinished investigation.
    first_appearance_chapter: 1
  - id: char_zhouyan
    name: 周砚
    role: mentor
    description: A former stage manager who reveals the old theater's hidden 
      secret.
    first_appearance_chapter: 2
locations:
  - id: loc_archive
    name: 城南档案馆
    description: An old archive near a rain-soaked alley.
  - id: loc_theater
    name: 旧剧院
    description: A closed theater where one stage lamp still burns.
props:
  - id: prop_letter
    name: 没有编号的信
    description: A mysterious letter written in the protagonist's father's hand.
  - id: prop_script
    name: 旧剧本
    description: A theater script whose third act hides an address.
scenes:
  - id: sc_001
    title: 第一幕 雨巷里的信
    source_chapters:
      - 1
    source_excerpt: "林夏在城南档案馆值夜班。傍晚的雨落在窄巷里，像有人把旧照片一张张翻过。她整理一箱无人认领的资料时，看见一封没有编号的信。信封上只有一句话：如果你还记得那盏灯，请在午夜前来旧剧院。\n\
      \n她本想把信放回去，却在信纸背面看见了父亲的笔迹。父亲三年前失踪，所有线索都停在一场被取消的戏剧排练"
    location_id: loc_archive
    time_of_day: night
    characters:
      - char_linxia
    purpose: Establish the inciting clue and turn atmosphere into a visible 
      discovery.
    scene_purpose: Establish the inciting clue and turn atmosphere into a 
      visible discovery.
    conflict: 林夏想确认信件来源，但信上的旧剧院把父亲失踪重新拉回眼前。
    emotional_shift: 从谨慎好奇到被迫行动。
    production_risk: Opening scene needs tactile investigation beats so it does 
      not rely on narration.
    format_type: short_drama
    actions:
      - text: 林夏把没有编号的信压在台灯下，翻出父亲旧档案，手指停在同一个剧院名上。
        beat: investigation
        origin: ai_adapted
    dialogues:
      - speaker_id: char_linxia
        line: 这不是馆里的编号，是他留给我的。
        emotion: determined
        origin: ai_adapted
    ai_added_content:
      - Add a playable beat that externalizes the chapter's inner suspicion.
    revision_suggestions:
      - Strengthen the opposing force if the scene feels too explanatory.
    adaptation_notes:
      - Compress prose exposition into visible action and concise dialogue.
      - 'Author style focus: psychological.'
  - id: sc_002
    title: 第二幕 旧剧院的灯
    source_chapters:
      - 2
    source_excerpt: "旧剧院早已停用，门口的海报被雨水泡得褪色。林夏推门进去，舞台中央却亮着一盏孤零零的灯。灯下站着一个陌生老人，自称周砚，是父亲当年的舞台监督。\n\
      \n周砚告诉她，那场被取消的排练并非意外。剧本里藏着一份账册的位置，而知道秘密的人接连离开。林夏追问父亲是否还活着，周砚只递给她第二封信，说"
    location_id: loc_theater
    time_of_day: night
    characters:
      - char_linxia
      - char_zhouyan
    purpose: Introduce the mentor figure and make the hidden past confront the 
      protagonist.
    scene_purpose: Introduce the mentor figure and make the hidden past confront
      the protagonist.
    conflict: 周砚知道真相却不愿全说，林夏必须在信任和怀疑之间逼近答案。
    emotional_shift: 从警惕试探到暂时结盟。
    production_risk: Mentor scene needs blocking and silence to avoid pure 
      exposition.
    format_type: short_drama
    actions:
      - text: 旧剧院的灯忽明忽暗，周砚挡在舞台边，不让林夏靠近后台的铁门。
        beat: investigation
        origin: ai_adapted
    dialogues:
      - speaker_id: char_linxia
        line: 你认识我父亲，也知道这盏灯为什么还亮着。
        emotion: determined
        origin: ai_adapted
    ai_added_content:
      - Add a playable beat that externalizes the chapter's inner suspicion.
    revision_suggestions:
      - Strengthen the opposing force if the scene feels too explanatory.
    adaptation_notes:
      - Compress prose exposition into visible action and concise dialogue.
      - 'Author style focus: psychological.'
  - id: sc_003
    title: 第三幕 第三幕台词
    source_chapters:
      - 3
    source_excerpt: "林夏翻开旧剧本，发现第三幕的台词被人用铅笔改过。每一句台词的第一个字连起来，是城北钟楼的地址。她意识到父亲留下的不是谜题，而是一条求救路线。\n\
      \n午夜钟声响起，剧院外传来脚步声。周砚催她从后台离开。林夏握着剧本冲进雨里，身后灯光熄灭。她第一次明白，父亲失踪前一直在保护某个真相，而现"
    location_id: loc_theater
    time_of_day: night
    characters:
      - char_linxia
      - char_zhouyan
    purpose: Convert the textual clue into a decisive next-step action beat.
    scene_purpose: Convert the textual clue into a decisive next-step action 
      beat.
    conflict: 旧剧本给出地址，也证明父亲的失踪不是意外，林夏必须选择是否继续。
    emotional_shift: 从焦虑困惑到坚定追查。
    production_risk: Clue-solving scene needs visible pattern discovery so the 
      reveal feels playable.
    format_type: short_drama
    actions:
      - text: 林夏用铅笔圈出第三幕每句台词的首字，把它们连成城北钟楼的地址。
        beat: investigation
        origin: ai_adapted
    dialogues:
      - speaker_id: char_linxia
        line: 第三幕不是结尾，是路线。
        emotion: determined
        origin: ai_adapted
    ai_added_content:
      - Add a playable beat that externalizes the chapter's inner suspicion.
    revision_suggestions:
      - Strengthen the opposing force if the scene feels too explanatory.
    adaptation_notes:
      - Compress prose exposition into visible action and concise dialogue.
      - 'Author style focus: psychological.'
adaptation_notes:
  - Keep the mystery clue chain visible from chapter to chapter.
  - Use scene purposes to make the YAML draft easy to continue polishing.
