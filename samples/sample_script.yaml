metadata:
  title: 雨巷里的来信
  source_chapter_count: 3
  language: zh-CN
  genre: mystery drama
  logline: A young archivist follows hidden letters through an abandoned theater
    to uncover why her father vanished.
adaptation_profile:
  format_type: short_drama
  adaptation_scale: faithful
  style_focus: psychological
  preserve_items:
    - 保留林夏、周砚和父亲失踪线索
  forbidden_changes:
    - 不要改变父亲失踪的核心设定
  author_notes: 心理活动尽量转成可表演动作和克制对白。
adaptation_strategy:
  - 建议先做忠实但更具戏剧推动力的短剧版：保留人物关系和线索链，把心理与氛围转成动作、对白和场景冲突。
  - Track source chapters and excerpts so the author can audit what changed.
  - Label AI additions separately from adapted source material.
characters:
  - id: char_linxia
    name: 林夏
    role: protagonist
    description: A careful young archivist who decides to continue her father's 
      unfinished investigation.
    first_appearance_chapter: 1
  - id: char_zhouyan
    name: 周砚
    role: mentor
    description: A former stage manager who reveals the old theater's hidden 
      secret.
    first_appearance_chapter: 2
locations:
  - id: loc_archive
    name: 城南档案馆
    description: An old archive near a rain-soaked alley.
  - id: loc_theater
    name: 旧剧院
    description: A closed theater where one stage lamp still burns.
props:
  - id: prop_letter
    name: 没有编号的信
    description: A mysterious letter written in the protagonist's father's hand.
  - id: prop_script
    name: 旧剧本
    description: A theater script whose third act hides an address.
scenes:
  - id: sc_001
    title: 第一幕 雨巷里的信
    source_chapters:
      - 1
    source_excerpt: "林夏在城南档案馆值夜班。傍晚的雨落在窄巷里，像有人把旧照片一张张翻过。她整理一箱无人认领的资料时，看见一封没有编号的信。信封上只有一句话：如果你还记得那盏灯，请在午夜前来旧剧院。\n\
      \n她本想把信放回去，却在信纸背面看见了父亲的笔迹。父亲三年前失踪，所有线索都停在一场被取消的戏剧排练"
    location_id: loc_archive
    time_of_day: night
    characters:
      - char_linxia
    purpose: Turn inner narration into a playable dramatic beat.
    scene_purpose: Turn inner narration into a playable dramatic beat.
    conflict: The protagonist wants the truth but every clue increases personal 
      risk.
    emotional_shift: From guarded curiosity to active determination.
    production_risk: Needs visible behavior so the mystery does not become pure 
      exposition.
    format_type: short_drama
    actions:
      - text: 林夏进入场景，线索推动她继续追查。来源章节：1。
        beat: investigation
        origin: ai_adapted
    dialogues:
      - speaker_id: char_linxia
        line: 这条线索不是偶然留下的。
        emotion: determined
