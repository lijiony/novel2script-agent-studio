      - 'Author style focus: psychological.'
  - id: sc_002
    title: 第二幕 旧剧院的灯
    source_chapters:
      - 2
    source_excerpt: "旧剧院早已停用，门口的海报被雨水泡得褪色。林夏推门进去，舞台中央却亮着一盏孤零零的灯。灯下站着一个陌生老人，自称周砚，是父亲当年的舞台监督。\n\
      \n周砚告诉她，那场被取消的排练并非意外。剧本里藏着一份账册的位置，而知道秘密的人接连离开。林夏追问父亲是否还活着，周砚只递给她第二封信，说"
    location_id: loc_theater
    time_of_day: night
    characters:
