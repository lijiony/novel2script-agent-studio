  - id: sc_003
    title: 第三幕 第三幕台词
    source_chapters:
      - 3
    source_excerpt: "林夏翻开旧剧本，发现第三幕的台词被人用铅笔改过。每一句台词的第一个字连起来，是城北钟楼的地址。她意识到父亲留下的不是谜题，而是一条求救路线。\n\
      \n午夜钟声响起，剧院外传来脚步声。周砚催她从后台离开。林夏握着剧本冲进雨里，身后灯光熄灭。她第一次明白，父亲失踪前一直在保护某个真相，而现"
